                                  onInput=${(e) => setRules(prev => prev.map(r =>
                                    r.id === rule.id ? { ...r, value: e.target.value, source: '用户修正' } : r
                                  ))} />
                              </td>
                              <td className="px-4 py-3 text-right">
                                <span className=${`text-[10px] px-1.5 py-0.5 rounded font-medium ${
                                  rule.source === '用户修正' ? 'bg-purple-100 text-purple-700' : 'bg-indigo-100 text-indigo-700'
                                }`}>${rule.source}</span>
                              </td>
                            </tr>`)}
                          <!-- 分隔行（当两组都有内容时） -->
                          ${hitCount > 0 && rules.some(r => r.source === '默认基线') && html`
                            <tr><td colSpan="4" className="px-4 py-2 bg-slate-100 text-xs text-slate-500 font-medium border-y border-slate-200">
                              以下 ${rules.filter(r => r.source === '默认基线').length} 项在规范文件中未明确提及，已套用通用学术规范默认值——请按需修改
                            </td></tr>`}
                          <!-- 默认值行 -->
                          ${rules.filter(r => r.source === '默认基线').map(rule => html`
                            <tr key=${rule.id} className="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                              <td className="px-4 py-3 text-slate-400 text-xs">${rule.category}</td>
                              <td className="px-4 py-3 font-medium text-slate-500">${rule.field}</td>
                              <td className="px-4 py-3">
                                <input type="text"
                                  className="w-full bg-white border border-slate-200 rounded px-2 py-1 focus:ring-2 focus:ring-indigo-500 outline-none text-sm text-slate-600"
                                  value=${rule.value}
                                  onInput=${(e) => setRules(prev => prev.map(r =>
                                    r.id === rule.id ? { ...r, value: e.target.value, source: '用户修正' } : r
                                  ))} />
                              </td>
                              <td className="px-4 py-3 text-right">
                                <span className="text-[10px] px-1.5 py-0.5 rounded font-medium bg-slate-100 text-slate-400">默认基线</span>
                              </td>
                            </tr>`)}
                        </tbody>
                      </table>
                    </div>

                    <div className="flex justify-between items-center pt-4 border-t border-slate-100">
                      <button onClick=${prevStep} className="px-6 py-2 border border-slate-300 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 transition-colors">
                        返回重传
                      </button>
                      <button onClick=${nextStep} className="px-8 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition-all">
                        确认规则，上传论文 →
                      </button>
                    </div>
                  </div>
                `}

                <!-- ═══ Step 2：上传论文 ═══ -->
                ${step === 2 && html`
                  <div className="space-y-8">
                    <div className="flex items-center gap-3 p-4 bg-green-50 border border-green-200 rounded-xl">
                      <${CheckCircle2} size=${18} className="text-green-600 shrink-0" />
                      <p className="text-sm text-green-800">
                        格式规则已确认（共 ${rules.length} 条）。请上传待校验的论文文件。
                      </p>
                    </div>

                    <${DropZone}
                      accept=".pdf,.docx,.doc,.txt,.md"
                      onFile=${processThesisFile}
                      isParsing=${thesisIsParsing}
                      fileName=${thesisFileName}
                      error=${thesisError}
                      title="上传待校论文"
                      hint="拖拽或点击上传论文文件"
                      acceptLabel="Word (.docx 可获得完整格式检测) · PDF · .doc · TXT"
                      Icon=${BookOpen}
                    />

                    ${thesisFileName && !thesisIsParsing && !thesisError && html`
                      <div className="bg-slate-50 border border-slate-200 p-4 rounded-xl flex items-center gap-3">
                        <${FileText} size=${18} className="text-slate-500 shrink-0" />
                        <div className="flex-1 min-w-0">
                          <p className="text-sm font-medium text-slate-800 truncate">${thesisFileName}</p>
                          <p className="text-xs text-slate-500 mt-0.5">
                            ${thesisXmlData
                              ? '✓ DOCX 格式，支持字体 / 字号 / 行距完整检测'
                              : '⚠ 非 DOCX 格式，仅执行文本层面校验（引用、标点等）'}
                          </p>
                        </div>
                      </div>`}

                    <div className="flex justify-between items-center pt-4 border-t border-slate-100">
                      <button onClick=${prevStep} className="px-6 py-2 border border-slate-300 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 transition-colors">
                        返回修改规则
                      </button>
                      <button
                        onClick=${startCheck}
                        disabled=${!canStartCheck}
                        className=${`px-8 py-2 rounded-lg text-sm font-medium transition-all ${
                          canStartCheck
                            ? 'bg-indigo-600 text-white hover:bg-indigo-700 shadow-lg shadow-indigo-200'
                            : 'bg-slate-200 text-slate-400 cursor-not-allowed'
                        }`}
                      >
                        开始校验
                      </button>
                    </div>
                  </div>
                `}

                <!-- ═══ Step 3：校验中 ═══ -->
                ${step === 3 && html`
                  <div className="py-12 flex flex-col items-center justify-center">
                    <div className="relative w-44 h-44 mb-8">
                      <svg className="w-full h-full transform -rotate-90" viewBox="0 0 176 176">
                        <circle cx="88" cy="88" r="80" stroke="#e2e8f0" strokeWidth="8" fill="transparent" />
                        <circle cx="88" cy="88" r="80" stroke="#4f46e5" strokeWidth="8" fill="transparent"
                          strokeDasharray="502.65"
                          strokeDashoffset=${502.65 - (502.65 * progress) / 100}
                          strokeLinecap="round"
                          style=${{ transition: 'stroke-dashoffset 0.2s ease' }}
                        />
                      </svg>
                      <div className="absolute inset-0 flex flex-col items-center justify-center">
                        <span className="text-3xl font-bold text-slate-800">${progress}%</span>
                        <span className="text-xs text-slate-500 mt-1 font-medium">全域扫描中</span>
                      </div>
                    </div>
                    <div className="w-full max-w-md space-y-4">
                      ${[
                        { label: '正在校验标题层级与目录对应关系…',  target: 20 },
                        { label: '正在执行参考文献双向引用比对…',    target: 50 },
                        { label: '正在检测字体、字号、行距参数…',    target: 75 },
                        { label: '正在完成中英文标点与格式审核…',    target: 100 },
                      ].map((task, i) => html`
                        <div key=${i} className=${`flex items-center gap-3 transition-opacity duration-500 ${progress >= task.target ? 'opacity-100' : 'opacity-30'}`}>
                          ${progress >= task.target
                            ? html`<${CheckCircle2} size=${16} className="text-green-500 shrink-0" />`
                            : html`<div className="w-4 h-4 rounded-full border-2 border-slate-200 border-t-indigo-600 animate-spin shrink-0" />`}
                          <span className="text-sm text-slate-700">${task.label}</span>
                        </div>`)}
                    </div>
                  </div>
                `}

                <!-- ═══ Step 4：校验报告 ═══ -->
                ${step === 4 && html`
                  <div className="space-y-6">
                    <div className="flex flex-col md:flex-row md:items-end justify-between gap-4">
                      <div>
                        <h2 className="text-2xl font-bold text-slate-800">校验报告摘要</h2>
                        <p className="text-slate-500 text-sm mt-1">论文文件：${thesisFileName}</p>
                      </div>
                      <div className="flex flex-wrap gap-2">
                        <button onClick=${exportPDF} className="flex items-center gap-2 px-4 py-2 border border-slate-300 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 transition-colors">
                          <${Download} size=${16} /> 导出 PDF 报告
                        </button>
                        <button onClick=${exportWord} className="flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition-colors">
                          <${FileText} size=${16} /> 导出带批注 Word
                        </button>
                        ${thesisFileName.endsWith('.docx') && thesisRawFile && html`
                          <button onClick=${exportAnnotated} disabled=${annotating}
                            className="flex items-center gap-2 px-4 py-2 bg-emerald-600 text-white rounded-lg text-sm font-medium hover:bg-emerald-700 shadow-lg shadow-emerald-200 transition-colors disabled:opacity-60 disabled:cursor-not-allowed">
                            ${annotating
                              ? html`<div className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin shrink-0"></div><span>标注中…</span>`
                              : html`<${FileSearch} size=${16} /><span>下载标注版原文</span>`}
                          </button>`}
                      </div>
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                      ${[
                        { label: '必须修改 (L1)', val: checkResults.issues.filter(i => i.level==='L1').length, color: 'text-red-600',   bg: 'bg-red-50',   border: 'border border-red-100' },
                        { label: '建议修改 (L2)', val: checkResults.issues.filter(i => i.level==='L2').length, color: 'text-amber-600', bg: 'bg-amber-50', border: 'border border-amber-100' },
                        { label: '提示关注 (L3)', val: checkResults.issues.filter(i => i.level==='L3').length, color: 'text-blue-600',  bg: 'bg-blue-50',  border: 'border border-blue-100' },
                        { label: '中文字符数',    val: checkResults.wordCount.toLocaleString(),               color: 'text-slate-700', bg: 'bg-slate-50', border: 'border border-slate-200' },
                      ].map((stat, i) => html`
                        <div key=${i} className=${`${stat.bg} ${stat.border} p-4 rounded-xl`}>
                          <p className="text-xs text-slate-500 font-medium">${stat.label}</p>
                          <p className=${`text-2xl font-bold mt-1 ${stat.color}`}>${stat.val}</p>
                        </div>`)}
                    </div>

                    ${checkResults.issues.length === 0
                      ? html`
                        <div className="text-center py-16 border border-slate-100 rounded-2xl bg-slate-50">
                          <${CheckCircle2} size=${52} className="text-green-500 mx-auto mb-4" />
                          <h3 className="text-xl font-bold text-slate-800">未发现明显格式问题</h3>
                          <p className="text-slate-500 mt-2 text-sm max-w-sm mx-auto">论文格式符合已确认的规范要求。建议仍以人工复核为准，特别是页边距和图片分辨率等参数。</p>
                        </div>`
                      : html`
                        <div className="space-y-4">
                          <h3 className="font-bold text-slate-800 flex items-center gap-2">
                            <${AlertCircle} size=${18} className="text-indigo-600" />
                            详细校验条目（共 ${checkResults.issues.length} 条）
                          </h3>
                          ${checkResults.issues.map(issue => {
                            const lv = RULE_LEVELS[issue.level];
                            const LvIcon = lv.icon;
                            return html`
                              <div key=${issue.id} className=${`border ${lv.border} rounded-xl overflow-hidden`}>
                                <div className=${`${lv.bg} px-4 py-3 flex items-center justify-between border-b ${lv.border}`}>
                                  <div className="flex items-center gap-2 min-w-0">
                                    <${LvIcon} size=${16} className=${lv.color + ' shrink-0'} />
                                    <span className=${`text-sm font-bold ${lv.color} shrink-0`}>${lv.label}</span>
                                    <span className="text-slate-300 mx-1 shrink-0">|</span>
                                    <span className="text-xs font-semibold text-slate-700 truncate">${issue.location}</span>
                                  </div>
                                  <span className="text-[10px] uppercase tracking-wider font-bold text-slate-400 shrink-0 ml-2">${issue.type}</span>
                                </div>
                                <div className="p-4 bg-white">
                                  <h4 className="font-bold text-slate-800">${issue.title}</h4>
                                  <p className="text-sm text-slate-600 mt-1">${issue.desc}</p>
                                  <div className="mt-3 flex flex-col md:flex-row gap-3 items-start md:items-center">
                                    <div className="flex-1 bg-slate-50 p-3 rounded-lg border border-slate-100">
                                      <span className="text-[10px] font-bold text-slate-400 block mb-1">修改建议</span>
                                      <p className="text-sm text-slate-700 font-medium">${issue.suggestion}</p>
                                    </div>
                                    <div className="px-3 py-1.5 bg-slate-100 rounded text-[10px] font-mono text-slate-500 shrink-0">
                                      依据：${issue.source}
                                    </div>
                                  </div>
                                </div>
                              </div>`;
                          })}
                        </div>`}

                    <div className="mt-8 p-6 border-2 border-indigo-100 rounded-2xl bg-indigo-50/30 flex flex-col md:flex-row items-center gap-6">
                      <div className="flex-1">
                        <h3 className="text-base font-bold text-indigo-900">工程边界说明</h3>
                        <p className="text-sm text-indigo-800/70 mt-2 leading-relaxed">
                          字体、字号、行距检测仅在上传 <strong>.docx</strong> 时生效；PDF 与 .doc 仅执行文本层校验（引用、标点等）。
                          页边距、图片分辨率、公式内部逻辑暂不在自动检测范围内，建议人工复核。
                        </p>
                      </div>
                      <button onClick=${reset}
                        className="px-6 py-3 bg-white border border-indigo-200 text-indigo-600 rounded-xl font-bold hover:bg-indigo-50 transition-colors shadow-sm whitespace-nowrap">
                        开始新任务
                      </button>
                    </div>
                  </div>
